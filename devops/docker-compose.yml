version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: vietmoney-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: vietmoney_db
      MYSQL_USER: ${MYSQL_USER:-vietmoney}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-vietmoney123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - vietmoney-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vietmoney-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - vietmoney-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: vietmoney-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_USERNAME: ${MYSQL_USER:-vietmoney}
      DB_PASSWORD: ${MYSQL_PASSWORD:-vietmoney123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-256-bit-key-here}
      AI_SERVICE_URL: http://ai-service:8001
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    ports:
      - "8080:8080"
    networks:
      - vietmoney-net

  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: vietmoney-ai
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ai_models:/app/app/models
    networks:
      - vietmoney-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: vietmoney-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - vietmoney-net

volumes:
  mysql_data:
  redis_data:
  ai_models:

networks:
  vietmoney-net:
    driver: bridge
